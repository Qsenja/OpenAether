<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAether</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="status-idle">
    <div id="drag-region">
        <div class="drag-handle"></div>
    </div>
    
    <div id="app">
        <main id="chat-history">
            <!-- Messages and Tool Calls -->
            <div class="message system brand-logo">
                OpenAether
            </div>
        </main>

        <div id="status-container">
            <button id="logs-btn" class="stylized-btn" title="View History & Logs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span>LOGS</span>
            </button>
            <span id="status-dot"></span>
            <span id="status-text">Idle</span>
        </div>

        <footer>
            <div class="input-wrapper">
                <div class="input-container">
                    <input type="text" id="user-input" placeholder="Awaiting instruction..." autocomplete="off">
                    <button id="send-btn" title="Send (Enter)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 11l5-5m0 0l5 5m-5-5v12"/>
                        </svg>
                    </button>
                    <button id="stop-btn" class="hidden" title="Stop Process">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <rect x="6" y="6" width="12" height="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>
    <div id="logs-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>SESSION LOGS</h2>
                <button id="close-logs" class="close-btn">&times;</button>
            </div>
            <div id="logs-list" class="logs-list">
                <!-- Log entries will be injected here -->
            </div>
            <div class="modal-footer">
                <div class="settings-group">
                    <label for="pastebin-key">PASTEBIN API KEY</label>
                    <input type="password" id="pastebin-key" placeholder="Enter dev key...">
                </div>
            </div>
        </div>
    </div>

    <div id="log-viewer-modal" class="modal hidden">
        <div class="modal-content viewer-modal">
            <div class="modal-header">
                <h2 id="viewer-title">LOG CONTENT</h2>
                <div class="modal-header-actions">
                    <button id="copy-log-btn" class="action-btn mini-btn">COPY</button>
                    <button id="close-viewer" class="close-btn">&times;</button>
                </div>
            </div>
            <div class="viewer-container">
                <pre id="log-content-area"></pre>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
